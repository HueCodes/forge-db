name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build release binaries for multiple platforms
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: forge-server
            asset_name: forge-server-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: forge-server
            asset_name: forge-server-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: forge-server
            asset_name: forge-server-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: v1-release-${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --bin forge-server

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish library to crates.io
  # ─────────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish forge-db
        run: cargo publish -p forge-db --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: build
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            huecodes/forge-db:${{ steps.version.outputs.VERSION }}
            huecodes/forge-db:latest
            ghcr.io/huecodes/forge-db:${{ steps.version.outputs.VERSION }}
            ghcr.io/huecodes/forge-db:latest
          labels: |
            org.opencontainers.image.title=forge-db
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release with artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --oneline)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: forge-db ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Downloads

            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | Linux    | x86_64      | forge-server-linux-x86_64.tar.gz |
            | macOS    | x86_64      | forge-server-macos-x86_64.tar.gz |
            | macOS    | ARM64       | forge-server-macos-arm64.tar.gz  |

            ## Docker

            ```bash
            docker pull huecodes/forge-db:${{ github.ref_name }}
            # or
            docker pull ghcr.io/huecodes/forge-db:${{ github.ref_name }}
            ```
          files: ./artifacts/**/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish Python bindings to PyPI
  # ─────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish Python (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: build
    environment: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: universal2-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        run: |
          cd forge-py
          maturin build --release --target ${{ matrix.target }} --out dist

      - name: Publish to PyPI
        run: |
          cd forge-py
          pip install twine
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
