# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
# Only check dependencies for the host target
targets = []

# ─────────────────────────────────────────────────────────────────────────────
# Advisories: block dependencies with known security vulnerabilities
# ─────────────────────────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

# ─────────────────────────────────────────────────────────────────────────────
# Licenses: allow only compatible OSI-approved licenses
# ─────────────────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
deny = [
    "AGPL-3.0",
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]
copyleft = "warn"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

# ─────────────────────────────────────────────────────────────────────────────
# Bans: disallow known-problematic or duplicate dependencies
# ─────────────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "deepest"

# Known acceptable duplicates (different major versions required by different deps)
skip = []

skip-tree = []

# ─────────────────────────────────────────────────────────────────────────────
# Sources: only allow dependencies from crates.io and known git sources
# ─────────────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
